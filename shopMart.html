<!DOCTYPE html>
<html>
  <head>
    <title>Shop Mart</title>
    <link rel="icon" href="images/logo.png">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Load a font called Roboto from Google Fonts. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Here are the CSS files for this page. -->
    <link rel="stylesheet" href="styles/shared/general.css">
    <link rel="stylesheet" href="styles/shared/shopMart-header.css">
    <link rel="stylesheet" href="styles/pages/shopMart.css">
  </head>
  <body>
    <div class="shopMart-header">
      <div class="shopMart-header-left-section">
        <a href="shopMart.html" class="header-link">
          <img class="shopMart-logo"
            src="images/logo.png">
        </a>
      </div>

      <div class="shopMart-header-middle-section">
        <input class="search-bar" type="text" placeholder="Search">

        <button class="search-button">
          <img class="search-icon" src="images/icons/search-icon.png">
        </button>
      </div>

      <div class="shopMart-header-right-section">
        <a class="orders-link header-link" href="orders.html">
          <span class="returns-text">Returns</span>
          <span class="orders-text">& Orders</span>
        </a>

        <a class="cart-link header-link" href="checkout.html">
          <img class="cart-icon" src="images/icons/cart-icon.png">
          <div class="cart-quantity js-cart-quantity">0</div>
          <div class="cart-text">Cart</div>
        </a>
      </div>
    </div>
    
    <div class="main">
      <div class="products-grid js-product-grid">
      </div>
    </div>

    <script type="module" src="scripts/shopMart.js"></script>    
  </body>
</html>
